<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory Scanner</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<div class="container">

<div class="card">

<h2>Inventory Scanner</h2>

<div id="dashboard">

<label>Nama Pengguna</label>

<input
type="text"
id="userName"
placeholder="Masukkan nama">

<h3>⚠️ Stok Minimum</h3>

<div id="lowStock">
Memuat data...
</div>

<button onclick="startMenu()">
Mulai Scan
</button>

</div>

<div id="menu" class="hidden">

<button onclick="startScan('IN')">
📥 Barang Masuk
</button>

<button onclick="startScan('OUT')">
📤 Barang Keluar
</button>

</div>

<div id="scanner" class="hidden">

<h3>Scan Barcode</h3>

<div id="reader"></div>

</div>

<div id="formArea" class="hidden">

<h3 id="namaBarang"></h3>

<p id="stokBarang"></p>

<input
type="number"
id="qty"
placeholder="Qty">

<textarea
id="keterangan"
placeholder="Keterangan"></textarea>

<button onclick="saveData()">
💾 Save
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
